name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          PACKAGE=github.com/lian-yang/trans/cmd

          mkdir -p dist

          # linux/amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "-X ${PACKAGE}.version=${VERSION}" -o dist/trans-linux-amd64 .
          tar -czf dist/trans-linux-amd64.tar.gz -C dist trans-linux-amd64

          # linux/arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "-X ${PACKAGE}.version=${VERSION}" -o dist/trans-linux-arm64 .
          tar -czf dist/trans-linux-arm64.tar.gz -C dist trans-linux-arm64

          # darwin/amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X ${PACKAGE}.version=${VERSION}" -o dist/trans-darwin-amd64 .
          tar -czf dist/trans-darwin-amd64.tar.gz -C dist trans-darwin-amd64

          # darwin/arm64
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X ${PACKAGE}.version=${VERSION}" -o dist/trans-darwin-arm64 .
          tar -czf dist/trans-darwin-arm64.tar.gz -C dist trans-darwin-arm64

          # windows/amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "-X ${PACKAGE}.version=${VERSION}" -o dist/trans-windows-amd64.exe .
          cd dist && tar -czf trans-windows-amd64.exe.zip trans-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*
